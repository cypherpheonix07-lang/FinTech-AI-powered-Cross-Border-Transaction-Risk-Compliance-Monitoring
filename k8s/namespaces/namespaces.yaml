# Kubernetes Namespace Definitions
# TransactTrace-Nexus Multi-Environment Setup
---
apiVersion: v1
kind: Namespace
metadata:
  name: transacttrace-prod
  labels:
    app: transacttrace
    environment: production
---
apiVersion: v1
kind: Namespace
metadata:
  name: transacttrace-staging
  labels:
    app: transacttrace
    environment: staging
