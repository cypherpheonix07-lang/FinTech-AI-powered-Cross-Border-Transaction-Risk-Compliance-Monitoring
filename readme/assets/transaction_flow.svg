<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes flow {
      0% { stroke-dashoffset: 100; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes pulse-node {
      0%, 100% { r: 6; opacity: 0.8; }
      50% { r: 10; opacity: 1; }
    }
    .path-bg {
      fill: none;
      stroke: #2d3748;
      stroke-width: 4;
    }
    .flow-line {
      fill: none;
      stroke: #4fd1c5;
      stroke-width: 3;
      stroke-dasharray: 10 20;
      animation: flow 2s linear infinite;
    }
    .node {
      fill: #4fd1c5;
      stroke: #1a202c;
      stroke-width: 2;
    }
    .node-pulse {
      animation: pulse-node 2s infinite;
    }
    .label {
      fill: #a0aec0;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      text-anchor: middle;
    }
  </style>
  
  <path class="path-bg" d="M50 150 Q 175 50, 300 150 T 550 150" />
  <path class="flow-line" d="M50 150 Q 175 50, 300 150 T 550 150" />

  <circle class="node node-pulse" cx="50" cy="150" r="8" />
  <text x="50" y="180" class="label">Sender</text>

  <circle class="node" cx="175" cy="100" r="6" />
  <text x="175" y="80" class="label">Bank A</text>

  <circle class="node node-pulse" cx="300" cy="150" r="8" />
  <text x="300" y="180" class="label">Clearing</text>

  <circle class="node" cx="425" cy="200" r="6" />
  <text x="425" y="230" class="label">Bank B</text>

  <circle class="node node-pulse" cx="550" cy="150" r="8" />
  <text x="550" y="180" class="label">Receiver</text>
</svg>
