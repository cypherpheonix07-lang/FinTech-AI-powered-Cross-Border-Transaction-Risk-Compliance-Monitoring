<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="#0d1117" rx="10" />

  <!-- Graph Nodes -->
  <g stroke="#334155" stroke-width="2">
    <line x1="100" y1="200" x2="250" y2="100" />
    <line x1="100" y1="200" x2="250" y2="300" />
    <line x1="250" y1="100" x2="400" y2="200" />
    <line x1="250" y1="300" x2="400" y2="200" />
    <line x1="400" y1="200" x2="550" y2="100" />
    <line x1="400" y1="200" x2="550" y2="300" />
    <line x1="550" y1="100" x2="700" y2="200" />
    <line x1="550" y1="300" x2="700" y2="200" />
  </g>

  <!-- Animated Pulse along edges -->
  <circle r="4" fill="#22d3ee" filter="url(#glow)">
    <animateMotion path="M100 200 L250 100 L400 200 L550 100 L700 200" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle r="4" fill="#f472b6" filter="url(#glow)">
    <animateMotion path="M100 200 L250 300 L400 200 L550 300 L700 200" dur="5s" repeatCount="indefinite" />
  </circle>

  <!-- Nodes with Risk Scores -->
  <g font-family="monospace" font-size="12" text-anchor="middle">
    <circle cx="100" cy="200" r="15" fill="#1e293b" stroke="#22d3ee" stroke-width="2" />
    <text x="100" y="235" fill="#94a3b8">SENDER</text>
    
    <circle cx="250" cy="100" r="18" fill="#1e293b" stroke="#22d3ee" stroke-width="2">
       <animate attributeName="stroke" values="#22d3ee;#3b82f6;#22d3ee" dur="3s" repeatCount="indefinite" />
    </circle>
    <text x="250" y="80" fill="#22d3ee">SAFE: 12</text>
    
    <circle cx="400" cy="200" r="25" fill="#1e293b" stroke="#f472b6" stroke-width="3" filter="url(#glow)">
       <animate attributeName="r" values="25;28;25" dur="1s" repeatCount="indefinite" />
    </circle>
    <text x="400" y="165" fill="#f472b6" font-weight="bold">RISK: 88</text>
    
    <circle cx="700" cy="200" r="15" fill="#1e293b" stroke="#22d3ee" stroke-width="2" />
    <text x="700" y="235" fill="#94a3b8">RECEIVER</text>
  </g>

  <text x="400" y="380" font-family="Arial" font-size="16" fill="#475569" text-anchor="middle">AI SENTINEL SCORE MAP (LIVE SIMULATION)</text>

</svg>
