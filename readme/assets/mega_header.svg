<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <filter id="glass" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" />
    </filter>
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.8">
        <animate attributeName="stop-color" values="#22d3ee;#818cf8;#22d3ee" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#headerGradient)" rx="20" />

  <!-- Animated Particles -->
  <g opacity="0.4">
    <circle cx="200" cy="100" r="2" fill="#22d3ee">
      <animate attributeName="cy" values="100;120;100" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="1000" cy="300" r="2" fill="#f472b6">
      <animate attributeName="cy" values="300;280;300" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;1;0.4" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="600" cy="200" r="1.5" fill="#facc15">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Glassmorphism Card -->
  <rect x="300" y="100" width="600" height="200" rx="30" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
  
  <!-- Content -->
  <text x="600" y="190" font-family="Arial, sans-serif" font-size="70" font-weight="900" text-anchor="middle" fill="#ffffff" filter="url(#glow)">
    PATHGUARD
  </text>
  <text x="600" y="240" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="url(#neonCyan)" style="letter-spacing: 5px;">
    THE FUTURE OF TRANSPARENT FINANCE
  </text>

  <style>
    @keyframes pulse {
      0% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.05); }
      100% { opacity: 0.3; transform: scale(1); }
    }
    .glow-ball {
      filter: blur(40px);
      animation: pulse 8s infinite ease-in-out;
    }
  </style>

  <!-- Background Glows -->
  <circle cx="300" cy="200" r="100" fill="#22d3ee" class="glow-ball" opacity="0.2" />
  <circle cx="900" cy="200" r="120" fill="#c084fc" class="glow-ball" opacity="0.2" style="animation-delay: -4s;" />

</svg>
