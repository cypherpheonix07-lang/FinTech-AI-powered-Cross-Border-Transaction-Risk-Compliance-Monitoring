<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neonBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" />
    </filter>
  </defs>

  <!-- Bento Grid Structure -->
  <g fill="rgba(15,23,42,0.8)" stroke="rgba(255,255,255,0.1)" stroke-width="1">
    <!-- Main Feature -->
    <rect x="20" y="20" width="370" height="220" rx="15">
       <animate attributeName="stroke" values="rgba(34,211,238,0.1);rgba(34,211,238,0.4);rgba(34,211,238,0.1)" dur="4s" repeatCount="indefinite" />
    </rect>
    <!-- Feature 2 -->
    <rect x="410" y="20" width="370" height="100" rx="15" />
    <!-- Feature 3 -->
    <rect x="410" y="140" width="370" height="100" rx="15" />
    <!-- Feature 4 -->
    <rect x="20" y="260" width="175" height="220" rx="15" />
    <!-- Feature 5 -->
    <rect x="215" y="260" width="175" height="220" rx="15" />
    <!-- Feature 6 -->
    <rect x="410" y="260" width="370" height="220" rx="15" />
  </g>

  <!-- Animated Data Nodes in Main Feature -->
  <g opacity="0.6">
    <circle cx="100" cy="100" r="4" fill="#22d3ee">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" />
    </circle>
    <path d="M100 100 L200 150 L300 80" stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.3" />
    <circle cx="200" cy="150" r="4" fill="#818cf8" />
    <circle cx="300" cy="80" r="4" fill="#facc15" />
  </g>

  <!-- Text Labels -->
  <text x="40" y="55" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff">AI SENTINEL SCORE</text>
  <text x="430" y="55" font-family="Arial" font-size="16" fill="#94a3b8">Institutional Whitepaper</text>
  <text x="430" y="175" font-family="Arial" font-size="16" fill="#94a3b8">Regulatory Compliance</text>
  
  <rect x="40" y="80" width="300" height="8" rx="4" fill="#1e293b" />
  <rect x="40" y="80" width="240" height="8" rx="4" fill="#22d3ee">
    <animate attributeName="width" values="0;240;210;240" dur="3s" repeatCount="indefinite" />
  </rect>

</svg>
