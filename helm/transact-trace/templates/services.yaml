apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.api.name }}-svc
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.api.name }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.api.name }}
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.ml.name }}-svc
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.ml.name }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.ml.name }}
  ports:
    - port: {{ .Values.ml.port }}
      targetPort: {{ .Values.ml.port }}
      protocol: TCP
---
{{- if .Values.postgres.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: {{ .Values.global.namespace }}
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
{{- end }}
{{- if .Values.redis.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: {{ .Values.global.namespace }}
  labels:
    app: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
{{- end }}
{{- if .Values.neo4j.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: neo4j-svc
  namespace: {{ .Values.global.namespace }}
  labels:
    app: neo4j
spec:
  type: ClusterIP
  selector:
    app: neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
{{- end }}
