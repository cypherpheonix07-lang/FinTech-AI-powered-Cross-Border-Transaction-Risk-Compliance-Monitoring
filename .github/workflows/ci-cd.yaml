# CI/CD Pipeline — GitHub Actions
name: TransactTrace CI/CD
on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: transacttrace

jobs:
  # ─── Lint & Test ─────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: cd backend && npm ci
      - run: cd backend && npx prisma generate
      - run: cd backend && npm run build

  test-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r fraud-ml-service/requirements.txt
      - run: cd ml && python -c "from feature_engineering import extract_features; print('OK')"

  # ─── Build & Push Docker Images ──────────────────────────────
  build-api:
    needs: test-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api-gateway:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api-gateway:latest

  build-ml:
    needs: test-ml
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./fraud-ml-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ml-scoring:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ml-scoring:latest

  # ─── Deploy to Kubernetes ────────────────────────────────────
  deploy-staging:
    needs: [build-api, build-ml]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}
      - name: Install Helm
        uses: azure/setup-helm@v4
      - run: |
          helm upgrade --install transact-trace ./helm/transact-trace \
            --namespace transacttrace-staging --create-namespace \
            --set api.image.tag=${{ github.sha }} \
            --set ml.image.tag=${{ github.sha }} \
            --values ./helm/transact-trace/values.yaml

  deploy-production:
    needs: [build-api, build-ml]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}
      - name: Install Helm
        uses: azure/setup-helm@v4
      - run: |
          helm upgrade --install transact-trace ./helm/transact-trace \
            --namespace transacttrace-prod --create-namespace \
            --set api.image.tag=${{ github.sha }} \
            --set ml.image.tag=${{ github.sha }} \
            --values ./helm/transact-trace/values.yaml
          kubectl rollout status deployment/api-gateway -n transacttrace-prod --timeout=300s
          kubectl rollout status deployment/ml-scoring -n transacttrace-prod --timeout=300s
